name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  check:
    name: Syntax check
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Verify app.js parses
        run: node --check app.js